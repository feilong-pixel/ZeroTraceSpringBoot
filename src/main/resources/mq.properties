# Spring AMQP / RabbitMQ Mail Configuration
mail.queue=mail.queue
mail.exchange=mail.exchange
mail.routing.key=mail.routing.key

# 消息队列最大容量长度配置
mail.queue.max-length=100
# 队列溢出策略：reject-publish（拒绝发布并发送nack）或 drop-head（丢弃最旧的）
mail.queue.overflow=reject-publish

# Rabbit listener 并发消费者配置：最小并发（concurrentConsumers）和最大并发（maxConcurrentConsumers）
# 最小并发为容器启动时创建的消费者数量，最大并发用于动态扩展（若 RabbitMQ 支持）
mail.listener.concurrentConsumers=1
mail.listener.maxConcurrentConsumers=5
